<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#fff6ee">
  <title>i miss you</title>
  <style>
    :root {
      color-scheme: light;
      --ink: #3d3030;
      --muted: #806565;
      --cream: #fff8ef;
      --rose: #f45d7f;
      --coral: #ff8a72;
      --sun: #f5bd4f;
      --mint: #80c7a3;
      --sky: #7fb8e6;
      --lav: #b58ae6;
      --shadow: 0 18px 42px rgba(81, 47, 54, 0.2);
      --safe-top: max(20px, env(safe-area-inset-top));
      --safe-bottom: max(22px, env(safe-area-inset-bottom));
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
    }

    body {
      overflow: hidden;
      color: var(--ink);
      font-family: ui-rounded, "SF Pro Rounded", "Avenir Next", Avenir, system-ui, sans-serif;
      background:
        radial-gradient(circle at 15% 16%, rgba(255, 138, 114, 0.32), transparent 28%),
        radial-gradient(circle at 85% 19%, rgba(127, 184, 230, 0.34), transparent 27%),
        radial-gradient(circle at 50% 90%, rgba(128, 199, 163, 0.24), transparent 31%),
        linear-gradient(145deg, #fff9f2 0%, #fff0f4 48%, #f5fbff 100%);
      touch-action: none;
      user-select: none;
      -webkit-user-select: none;
    }

    .scene {
      position: relative;
      width: 100vw;
      height: 100vh;
      height: 100svh;
      height: 100dvh;
      min-height: 480px;
      overflow: hidden;
      isolation: isolate;
    }

    .skyline {
      position: absolute;
      inset: var(--safe-top) 18px var(--safe-bottom);
      border: 1px solid rgba(61, 48, 48, 0.06);
      border-radius: 30px;
      background:
        linear-gradient(120deg, rgba(255, 255, 255, 0.58), rgba(255, 255, 255, 0.18)),
        repeating-linear-gradient(115deg, rgba(255, 255, 255, 0.24) 0 2px, transparent 2px 18px);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.75);
      z-index: -2;
    }

    .orbital {
      position: absolute;
      left: 50%;
      top: 50%;
      width: min(82vw, 460px);
      aspect-ratio: 1;
      border: 1px dashed rgba(61, 48, 48, 0.12);
      border-radius: 50%;
      transform: translate(-50%, -50%) rotate(-12deg);
      z-index: -1;
      animation: drift 18s linear infinite;
    }

    .orbital::before,
    .orbital::after {
      content: "";
      position: absolute;
      width: 11px;
      height: 11px;
      border-radius: 50%;
      background: var(--coral);
      box-shadow: 0 0 0 7px rgba(255, 138, 114, 0.16);
    }

    .orbital::before {
      left: 18%;
      top: 8%;
    }

    .orbital::after {
      right: 10%;
      bottom: 20%;
      background: var(--sky);
      box-shadow: 0 0 0 7px rgba(127, 184, 230, 0.16);
    }

    .hint {
      position: absolute;
      left: 50%;
      top: calc(var(--safe-top) + 22px);
      width: min(86vw, 430px);
      margin: 0;
      color: var(--muted);
      font-size: clamp(0.95rem, 4.1vw, 1.2rem);
      font-weight: 720;
      letter-spacing: 0;
      line-height: 1.25;
      text-align: center;
      opacity: 0.88;
      transform: translateX(-50%);
      transition: opacity 240ms ease, transform 240ms ease;
      pointer-events: none;
    }

    .hint.bump {
      opacity: 1;
      transform: translateX(-50%) translateY(-2px) scale(1.04);
    }

    .piece {
      position: absolute;
      left: 0;
      top: 0;
      min-width: 74px;
      min-height: 58px;
      padding: 13px 20px 15px;
      border: 1px solid rgba(61, 48, 48, 0.08);
      border-radius: 20px;
      color: var(--ink);
      font-size: clamp(2.15rem, 11vw, 4.25rem);
      font-weight: 820;
      line-height: 1;
      letter-spacing: 0;
      text-align: center;
      background: rgba(255, 255, 255, 0.76);
      box-shadow: var(--shadow);
      backdrop-filter: blur(16px);
      cursor: pointer;
      transform: translate3d(-999px, -999px, 0);
      will-change: transform;
      z-index: 2;
    }

    .scene.ready .piece {
      transition:
        transform 430ms cubic-bezier(.17, .9, .25, 1.18),
        background-color 180ms ease,
        box-shadow 180ms ease,
        opacity 260ms ease,
        filter 260ms ease;
    }

    .piece[data-word="miss"] {
      background: rgba(255, 246, 221, 0.84);
    }

    .piece[data-word="you"] {
      background: rgba(235, 249, 255, 0.82);
    }

    .piece:active {
      background: rgba(255, 255, 255, 0.96);
      box-shadow: 0 10px 25px rgba(81, 47, 54, 0.16);
      filter: saturate(1.08);
    }

    .piece.caught {
      pointer-events: none;
    }

    .final {
      position: absolute;
      inset: var(--safe-top) 18px var(--safe-bottom);
      display: grid;
      place-items: center;
      opacity: 0;
      pointer-events: none;
      transform: translateY(14px) scale(0.96);
      transition: opacity 620ms ease, transform 620ms cubic-bezier(.16, .86, .22, 1.08);
      z-index: 3;
    }

    .final.is-visible {
      opacity: 1;
      transform: translateY(0) scale(1);
    }

    .final-copy {
      width: min(560px, 100%);
      text-align: center;
    }

    h1 {
      margin: 0;
      font-size: clamp(3.4rem, 17vw, 7.6rem);
      line-height: 0.92;
      letter-spacing: 0;
      text-wrap: balance;
      text-shadow: 0 10px 28px rgba(88, 52, 59, 0.12);
    }

    .note {
      margin: 18px auto 0;
      max-width: 19rem;
      color: var(--muted);
      font-size: clamp(1rem, 4.4vw, 1.28rem);
      font-weight: 650;
      line-height: 1.35;
    }

    .pop,
    .heart {
      position: absolute;
      pointer-events: none;
      z-index: 1;
    }

    .pop {
      width: 9px;
      height: 9px;
      border-radius: 50%;
      background: var(--color, var(--rose));
      animation: pop 650ms ease-out forwards;
    }

    .heart {
      left: 50%;
      bottom: 18%;
      width: 15px;
      height: 15px;
      color: var(--rose);
      opacity: 0;
      transform: translate(-50%, 0) rotate(45deg) scale(0.8);
      animation: float-heart 1900ms ease-out forwards;
      background: currentColor;
      z-index: 4;
    }

    .heart::before,
    .heart::after {
      content: "";
      position: absolute;
      width: 100%;
      height: 100%;
      border-radius: 50%;
      background: currentColor;
    }

    .heart::before {
      left: -50%;
    }

    .heart::after {
      top: -50%;
    }

    .scene.flash::after {
      content: "";
      position: absolute;
      inset: 0;
      background: rgba(255, 255, 255, 0.6);
      animation: flash 720ms ease-out forwards;
      pointer-events: none;
      z-index: 5;
    }

    @keyframes drift {
      to {
        transform: translate(-50%, -50%) rotate(348deg);
      }
    }

    @keyframes pop {
      0% {
        opacity: 0.95;
        transform: translate(-50%, -50%) scale(0.45);
      }
      100% {
        opacity: 0;
        transform: translate(calc(-50% + var(--x)), calc(-50% + var(--y))) scale(1.2);
      }
    }

    @keyframes float-heart {
      0% {
        opacity: 0;
        transform: translate(-50%, 0) rotate(45deg) scale(0.55);
      }
      18% {
        opacity: 0.92;
      }
      100% {
        opacity: 0;
        transform: translate(calc(-50% + var(--drift, 0px)), -210px) rotate(45deg) scale(1.18);
      }
    }

    @keyframes flash {
      0% {
        opacity: 0.8;
      }
      100% {
        opacity: 0;
      }
    }

    @media (min-width: 720px) {
      .scene {
        min-height: 620px;
      }

      .piece {
        min-width: 92px;
        min-height: 70px;
        padding-inline: 26px;
        border-radius: 22px;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .orbital {
        animation: none;
      }

      .piece,
      .final,
      .hint {
        transition-duration: 90ms;
      }

      .pop,
      .heart,
      .scene.flash::after {
        animation-duration: 500ms;
      }
    }
  </style>
</head>
<body>
  <main class="scene" aria-label="A little message">
    <div class="skyline" aria-hidden="true"></div>
    <div class="orbital" aria-hidden="true"></div>
    <p class="hint" aria-live="polite">try to catch it</p>

    <button class="piece" type="button" data-word="i" aria-label="i">i</button>
    <button class="piece" type="button" data-word="miss" aria-label="miss">miss</button>
    <button class="piece" type="button" data-word="you" aria-label="you">you</button>

    <section class="final" aria-live="polite" aria-hidden="true">
      <div class="final-copy">
        <h1>i miss you</h1>
        <p class="note">wish you were here, preferably immediately</p>
      </div>
    </section>
  </main>

  <script>
    (() => {
      const scene = document.querySelector(".scene");
      const hint = document.querySelector(".hint");
      const pieces = [...document.querySelectorAll(".piece")];
      const final = document.querySelector(".final");
      const maxEscapes = 8;
      const palette = ["#f45d7f", "#ff8a72", "#f5bd4f", "#80c7a3", "#7fb8e6", "#b58ae6"];
      const hintCopy = ["try to catch it", "hey", "too slow", "almost", "nope", "okay okay", "one more", "fine"];
      const reducedMotion = window.matchMedia("(prefers-reduced-motion: reduce)").matches;

      let attempts = 0;
      let finished = false;
      let positions = new Map();

      const clamp = (value, min, max) => Math.min(Math.max(value, min), max);

      function numericCssVar(name, fallback) {
        const value = getComputedStyle(document.documentElement).getPropertyValue(name).trim();
        const parsed = parseFloat(value);
        return Number.isFinite(parsed) ? parsed : fallback;
      }

      function boundsFor(piece) {
        const rect = piece.getBoundingClientRect();
        const margin = scene.clientWidth < 480 ? 14 : 24;
        const topSafe = numericCssVar("--safe-top", 20);
        const bottomSafe = numericCssVar("--safe-bottom", 22);
        const hintSpace = Math.min(86, Math.max(58, scene.clientHeight * 0.1));

        return {
          minX: margin + rect.width / 2,
          maxX: scene.clientWidth - margin - rect.width / 2,
          minY: topSafe + hintSpace + rect.height / 2,
          maxY: scene.clientHeight - bottomSafe - margin - rect.height / 2
        };
      }

      function safePoint(piece, x, y) {
        const b = boundsFor(piece);
        return {
          x: clamp(x, b.minX, Math.max(b.minX, b.maxX)),
          y: clamp(y, b.minY, Math.max(b.minY, b.maxY))
        };
      }

      function setPosition(piece, x, y, rotate = 0, scale = 1) {
        const point = safePoint(piece, x, y);
        positions.set(piece, { x: point.x, y: point.y, rotate, scale });
        piece.style.transform = `translate3d(${point.x}px, ${point.y}px, 0) translate(-50%, -50%) rotate(${rotate}deg) scale(${scale})`;
      }

      function scatterInitial() {
        if (finished) return;

        const w = scene.clientWidth;
        const h = scene.clientHeight;
        const compact = w < 430;
        const starts = compact
          ? [[w * 0.27, h * 0.35, -9], [w * 0.58, h * 0.5, 5], [w * 0.38, h * 0.66, -4]]
          : [[w * 0.34, h * 0.34, -8], [w * 0.57, h * 0.5, 4], [w * 0.43, h * 0.66, -5]];

        pieces.forEach((piece, index) => {
          const [x, y, rotate] = starts[index];
          setPosition(piece, x, y, rotate);
        });
      }

      function updateHint(text) {
        hint.textContent = text;
        hint.classList.add("bump");
        window.setTimeout(() => hint.classList.remove("bump"), 180);
      }

      function particles(x, y, count = 8) {
        if (reducedMotion) return;

        for (let i = 0; i < count; i += 1) {
          const pop = document.createElement("span");
          const angle = (Math.PI * 2 * i) / count + Math.random() * 0.35;
          const distance = 26 + Math.random() * 32;
          pop.className = "pop";
          pop.style.left = `${x}px`;
          pop.style.top = `${y}px`;
          pop.style.setProperty("--x", `${Math.cos(angle) * distance}px`);
          pop.style.setProperty("--y", `${Math.sin(angle) * distance}px`);
          pop.style.setProperty("--color", palette[i % palette.length]);
          scene.appendChild(pop);
          pop.addEventListener("animationend", () => pop.remove(), { once: true });
        }
      }

      function dodge(piece, pointerX, pointerY) {
        const current = positions.get(piece) || {
          x: piece.getBoundingClientRect().left + piece.offsetWidth / 2,
          y: piece.getBoundingClientRect().top + piece.offsetHeight / 2
        };
        const away = Math.atan2(current.y - pointerY, current.x - pointerX);
        const wiggle = (Math.random() - 0.5) * 1.55;
        const distance = Math.min(scene.clientWidth, scene.clientHeight) * (reducedMotion ? 0.2 : 0.31);
        let nextX = current.x + Math.cos(away + wiggle) * distance;
        let nextY = current.y + Math.sin(away + wiggle) * distance;

        if (Math.hypot(nextX - current.x, nextY - current.y) < 32) {
          nextX = scene.clientWidth * (0.22 + Math.random() * 0.56);
          nextY = scene.clientHeight * (0.28 + Math.random() * 0.48);
        }

        const rotate = clamp((Math.random() - 0.5) * 22, -12, 12);
        setPosition(piece, nextX, nextY, rotate, 1 + Math.random() * 0.04);
      }

      function gatherThenReveal() {
        if (finished) return;
        finished = true;
        updateHint("caught");

        const centerX = scene.clientWidth / 2;
        const centerY = scene.clientHeight / 2;
        const finalSpots = [
          [centerX - Math.min(128, scene.clientWidth * 0.26), centerY - 48, -6],
          [centerX, centerY, 2],
          [centerX + Math.min(126, scene.clientWidth * 0.25), centerY + 52, 7]
        ];

        pieces.forEach((piece, index) => {
          piece.classList.add("caught");
          const [x, y, rotate] = finalSpots[index];
          setPosition(piece, x, y, rotate, 1.04);
        });

        window.setTimeout(() => {
          pieces.forEach((piece) => {
            piece.style.opacity = "0";
            piece.style.filter = "blur(6px)";
          });
          hint.style.opacity = "0";
          scene.classList.add("flash");
          final.setAttribute("aria-hidden", "false");
          final.classList.add("is-visible");
          burstHearts();
          window.setTimeout(burstHearts, 360);
        }, reducedMotion ? 180 : 580);
      }

      function burstHearts() {
        const count = reducedMotion ? 9 : 24;

        for (let i = 0; i < count; i += 1) {
          const heart = document.createElement("span");
          const size = 8 + Math.random() * 15;
          heart.className = "heart";
          heart.style.width = `${size}px`;
          heart.style.height = `${size}px`;
          heart.style.left = `${22 + Math.random() * 56}%`;
          heart.style.bottom = `${10 + Math.random() * 25}%`;
          heart.style.color = palette[i % palette.length];
          heart.style.setProperty("--drift", `${(Math.random() - 0.5) * 150}px`);
          heart.style.animationDelay = `${Math.random() * 280}ms`;
          scene.appendChild(heart);
          heart.addEventListener("animationend", () => heart.remove(), { once: true });
        }
      }

      pieces.forEach((piece) => {
        piece.addEventListener("pointerdown", (event) => {
          event.preventDefault();
          if (finished) return;

          attempts += 1;
          particles(event.clientX, event.clientY, 7 + Math.min(attempts, 5));
          updateHint(hintCopy[Math.min(attempts, hintCopy.length - 1)]);

          if (attempts >= maxEscapes) {
            gatherThenReveal();
            return;
          }

          dodge(piece, event.clientX, event.clientY);

          if (attempts >= 3) {
            const others = pieces.filter((item) => item !== piece);
            const extra = others[Math.floor(Math.random() * others.length)];
            window.setTimeout(() => dodge(extra, event.clientX, event.clientY), 80);
          }
        });
      });

      window.addEventListener("resize", () => {
        window.requestAnimationFrame(scatterInitial);
      });
      window.addEventListener("orientationchange", () => {
        window.setTimeout(scatterInitial, 180);
      });

      window.requestAnimationFrame(() => {
        scatterInitial();
        window.requestAnimationFrame(() => scene.classList.add("ready"));
      });
    })();
  </script>
</body>
</html>
